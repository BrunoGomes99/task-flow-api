services:
  taskflow.api:
    image: ${DOCKER_REGISTRY:-}taskflowapi
    build:
      context: .
      dockerfile: src/TaskFlow.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_HTTP_PORTS: "8080"
      MongoDb__ConnectionString: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-example}@mongo:27017/?authSource=admin
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - taskflow-net

  mongo:
    image: mongo:8.0
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-example}
    networks:
      - taskflow-net
    volumes:
      - taskflow-db:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet "mongodb://$$MONGO_INITDB_ROOT_USERNAME:$$MONGO_INITDB_ROOT_PASSWORD@127.0.0.1:27017/admin" --eval "db.adminCommand({ ping: 1 }).ok" | grep -q 1',
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s

  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${MONGO_EXPRESS_HOST_PORT:-8082}:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_ROOT_USERNAME:-root}:${MONGO_ROOT_PASSWORD:-example}@mongo:27017/?authSource=admin
      ME_CONFIG_BASICAUTH_ENABLED: "true"
      ME_CONFIG_BASICAUTH_USERNAME: ${MONGO_EXPRESS_USER:-mongoexpressuser}
      ME_CONFIG_BASICAUTH_PASSWORD: ${MONGO_EXPRESS_PASSWORD:-mongoexpresspass}
    networks:
      - taskflow-net

volumes:
  taskflow-db:

networks:
  taskflow-net:
    driver: bridge
